[build]
builder = "NIXPACKS"
# Proxy only needs ws — skip Vite/TypeScript frontend build
buildCommand = "npm install --omit=dev"

[deploy]
startCommand = "sh -c 'if [ \"$RAILWAY_SERVICE_NAME\" = \"selfhosted-voice\" ]; then node backend/server.js; else node proxy.js; fi'"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
